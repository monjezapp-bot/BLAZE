<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF9500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flameInner" x1="0%" y1="100%" x2="40%" y2="0%">
      <stop offset="0%" style="stop-color:#FF3D00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFAB00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Flame outer -->
  <path d="M55 100 C55 100 28 85 28 62 C28 48 36 38 44 30 C44 30 42 46 52 50 C52 50 44 36 58 18 C58 18 56 38 68 44 C68 44 64 30 72 20 C72 20 88 40 80 60 C80 60 88 52 86 42 C86 42 100 56 96 76 C93 90 82 100 55 100Z"
    fill="url(#flameGrad)" filter="url(#glow)"/>

  <!-- Flame inner -->
  <path d="M55 95 C55 95 40 84 40 68 C40 58 46 50 52 44 C52 44 50 56 58 60 C58 60 56 50 64 40 C64 40 70 52 66 64 C66 64 72 56 70 48 C70 48 82 60 78 74 C75 84 67 95 55 95Z"
    fill="url(#flameInner)" opacity="0.85"/>

  <!-- Highlight -->
  <ellipse cx="52" cy="72" rx="5" ry="10" fill="white" opacity="0.25" transform="rotate(-15 52 72)"/>

  <!-- BLAZE text -->
  <text x="118" y="78"
    font-family="'Cairo', 'Arial Black', sans-serif"
    font-weight="900"
    font-size="58"
    letter-spacing="-1"
    fill="#1A2E35">BLAZE</text>

  <!-- Tagline -->
  <text x="120" y="100"
    font-family="'Cairo', 'Arial', sans-serif"
    font-weight="700"
    font-size="14"
    letter-spacing="4"
    fill="#1A2E35"
    opacity="0.5">مصفوفة أيزنهاور</text>
</svg>
